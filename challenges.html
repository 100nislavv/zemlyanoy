<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <title>Skills — Challenges</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --background-default: #111111;
      --background-subtitle: #252525;
      --text-primary: #efeff1;
      --text-secondary: rgba(239, 239, 241, 0.6);
      --button-white-bg: #efeff1;
      --button-white-text: #111111;
      --accent-cyan: #3cd3fe;
      --vibrant-tertiary: #121212;
      --label-vibrant: #f5f5f5;
      --hero-green: #136458;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #000;
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      padding: 32px 0;
      background: radial-gradient(ellipse at center top, #1c1c20 0%, #000 70%);
      min-height: 100vh;
    }

    .phone {
      position: relative;
      width: 390px;
      height: 844px;
      background: var(--background-default);
      overflow: hidden;
      border-radius: 48px;
      box-shadow:
        0 0 0 12px #1d1d1f,
        0 0 0 14px #2a2a2c,
        0 40px 80px rgba(0, 0, 0, 0.6),
        0 20px 40px rgba(0, 0, 0, 0.4);
    }

    @media (max-width: 500px) {
      body { padding: 0; min-height: 100vh; background: var(--background-default); }
      .phone {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }
    }

    /* ----- Main scrollable content ----- */
    .content {
      position: absolute;
      inset: 0;
      padding: 24px 16px 130px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .content::-webkit-scrollbar { display: none; }
    .content > * + * { margin-top: 24px; }

    /* ----- Leagues progress ----- */
    .leagues-card {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 358px;
      padding: 16px;
      background: var(--background-subtitle);
      border-radius: 16px;
      overflow: hidden;
    }
    .leagues-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      justify-content: center;
      height: 33px;
    }
    .leagues-body p {
      font-size: 14px;
      line-height: 21px;
      color: var(--text-primary);
      white-space: nowrap;
    }
    .progress-bar {
      height: 6px;
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }
    .progress-bar .fill {
      position: absolute;
      left: 0;
      bottom: -0.5px;
      height: 6px;
      width: 80%;
      background: #ffffff;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .progress-bar .fill.no-anim {
      transition: none;
    }
    .league-badge {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      transform-origin: center;
    }
    .league-badge img {
      display: block;
      width: 100%;
      height: 100%;
    }
    .league-badge.is-leveling-up {
      animation: leagueLevelUp 1000ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes leagueLevelUp {
      0%   { transform: scale(1)   rotate(0deg); }
      50%  { transform: scale(1.7) rotate(180deg); }
      100% { transform: scale(1)   rotate(360deg); }
    }

    /* ----- Sections ----- */
    .challenges-section {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      width: 358px;
    }
    .challenges-section.last {
      padding-bottom: 24px;
    }
    .section-text {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }
    .section-title {
      font-weight: 700;
      font-size: 24px;
      line-height: 1.35;
      color: var(--text-primary);
    }
    .section-subtitle {
      font-size: 14px;
      line-height: 21px;
      color: var(--text-secondary);
    }

    /* ----- Hero (daily) challenge card ----- */
    .hero-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 358px;
      padding: 16px 16px 20px;
      background: var(--hero-green);
      border-radius: 16px;
      overflow: hidden;
      transition: background 0.3s ease;
    }
    .hero-mascot {
      position: relative;
      width: 151px;
      height: 160px;
      overflow: hidden;
      border-radius: 8px;
      flex-shrink: 0;
      transition: width 0.3s ease, height 0.3s ease;
    }
    .hero-mascot .v {
      position: absolute;
      display: block;
    }
    .hero-mascot .v img {
      display: block;
      width: 100%;
      height: 100%;
    }
    .hero-title {
      font-weight: 700;
      font-size: 28px;
      line-height: 36px;
      color: var(--text-primary);
      text-align: center;
      margin: 0;
      width: 100%;
    }
    .hero-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 60px;
      padding: 14px 18px;
      background: var(--button-white-bg);
      color: var(--button-white-text);
      font-weight: 600;
      font-size: 16px;
      line-height: 16px;
      border-radius: 1000px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.3s ease;
    }

    /* Completed state */
    .hero-card.is-completed {
      background: var(--background-subtitle);
    }
    .hero-card.is-completed .hero-mascot {
      width: 60px;
      height: 64px;
    }
    .hero-card.is-completed .hero-title {
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      text-decoration-skip-ink: none;
    }
    .hero-card.is-completed .hero-button {
      opacity: 0.4;
      cursor: default;
    }

    /* ----- Completed-this-week cards ----- */
    .completed-card {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 358px;
      padding: 16px;
      background: var(--background-subtitle);
      border-radius: 16px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      color: var(--text-primary);
      text-align: left;
      overflow: hidden;
    }
    .completed-icon {
      width: 30px;
      height: 32px;
      flex-shrink: 0;
      display: block;
      border-radius: 4px;
      background: #38393b;
    }
    .completed-icon img {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 4px;
    }
    .completed-text {
      flex: 1;
      min-width: 0;
      font-size: 16px;
      line-height: 21px;
      color: var(--text-primary);
    }

    /* ----- Tab bar (liquid glass) ----- */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 16px 25px 25px;
      z-index: 10;
    }
    .tab-bar-buttons {
      position: relative;
      display: flex;
      flex: 1;
      justify-content: center;
      padding: 4px 14px 4px 6px;
      border-radius: 1000px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.08),
        0 8px 40px rgba(0, 0, 0, 0.3);
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      padding: 6px 8px 7px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--label-vibrant);
      font-family: inherit;
      position: relative;
      border-radius: 100px;
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .tab-btn .icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
    }
    .tab-btn .icon svg {
      width: 26px;
      height: 26px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tab-btn .label {
      font-weight: 600;
      font-size: 10px;
      line-height: 12px;
      letter-spacing: -0.1px;
    }
    .tab-btn.active {
      color: var(--accent-cyan);
    }
    .tab-btn.active::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(18, 18, 18, 0.65);
      border-radius: 100px;
      mix-blend-mode: plus-lighter;
      z-index: -1;
    }
  </style>
</head>
<body>
  <div class="phone" role="application" aria-label="Skills app preview">

    <main class="content">

      <!-- Leagues progress -->
      <div class="leagues-card" aria-label="League progress">
        <div class="leagues-body">
          <p id="progress-label">4/5 lessons to next league</p>
          <div class="progress-bar" aria-label="Lessons until next league">
            <div class="fill" id="progress-fill"></div>
          </div>
        </div>
        <div class="league-badge" id="league-badge" aria-hidden="true">
          <img id="league-img" src="assets/challenges/leagues/league-1.png" alt="" />
        </div>
      </div>

      <!-- Daily challenge -->
      <section class="challenges-section" aria-label="Daily challenge">
        <div class="section-text">
          <h2 class="section-title">Daily challenge</h2>
          <p class="section-subtitle">Based on the last completed lessons</p>
        </div>
        <article class="hero-card" id="hero-card">
          <div class="hero-mascot" aria-hidden="true">
            <span class="v" style="inset: 8.11% 7.76% 6.86% 7.71%;"><img src="assets/challenges/fox/fox-1.svg" alt="" /></span>
            <span class="v" style="inset: 73.79% 28.19% 6.86% 11.3%;"><img src="assets/challenges/fox/fox-2.svg" alt="" /></span>
            <span class="v" style="inset: 77.67% 38.29% 13.32% 21.5%;"><img src="assets/challenges/fox/fox-3.svg" alt="" /></span>
            <span class="v" style="inset: 77.67% 38.31% 18.49% 21.69%;"><img src="assets/challenges/fox/fox-4.svg" alt="" /></span>
            <span class="v" style="inset: 81.08% 75.92% 18.51% 21.69%;"><img src="assets/challenges/fox/fox-5.svg" alt="" /></span>
            <span class="v" style="inset: 81.25% 43.03% 18.56% 53.12%;"><img src="assets/challenges/fox/fox-6.svg" alt="" /></span>
            <span class="v" style="inset: 31% 30.19% 49.96% 30.62%;"><img src="assets/challenges/fox/fox-7.svg" alt="" /></span>
            <span class="v" style="inset: 35.09% 34.46% 55.61% 48.35%;"><img src="assets/challenges/fox/fox-8.svg" alt="" /></span>
            <span class="v" style="inset: 40.36% 7.77% 54.15% 86.32%;"><img src="assets/challenges/fox/fox-9.svg" alt="" /></span>
            <span class="v" style="inset: 14.95% 58.85% 78.18% 36.1%;"><img src="assets/challenges/fox/fox-10.svg" alt="" /></span>
            <span class="v" style="inset: 9.86% 44.89% 75.99% 43.87%;"><img src="assets/challenges/fox/fox-11.svg" alt="" /></span>
          </div>
          <h3 class="hero-title">Ask for support without apologizing</h3>
          <button class="hero-button" type="button" id="hero-toggle">Completed</button>
        </article>
      </section>

      <!-- Completed this week -->
      <section class="challenges-section last" aria-label="Completed this week">
        <div class="section-text">
          <h2 class="section-title">Completed this week</h2>
          <p class="section-subtitle">Something you can be proud of</p>
        </div>

        <button class="completed-card" type="button">
          <span class="completed-icon"><img src="assets/challenges/icon-1.png" alt="" /></span>
          <span class="completed-text">Provide constructive feedback</span>
        </button>

        <button class="completed-card" type="button">
          <span class="completed-icon"><img src="assets/challenges/icon-2.png" alt="" /></span>
          <span class="completed-text">Set clear expectations for collaboration</span>
        </button>

        <button class="completed-card" type="button">
          <span class="completed-icon"><img src="assets/challenges/icon-2.png" alt="" /></span>
          <span class="completed-text">Encourage open communication channels</span>
        </button>

        <button class="completed-card" type="button">
          <span class="completed-icon"><img src="assets/challenges/icon-1.png" alt="" /></span>
          <span class="completed-text">Foster a culture of collaboration and support</span>
        </button>
      </section>
    </main>

    <!-- Tab Bar (liquid glass) -->
    <nav class="tab-bar" aria-label="Main navigation">
      <div class="tab-bar-buttons">
        <a class="tab-btn" href="#">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 26 26"><circle cx="13" cy="13" r="10"/><path d="M3 13h20M13 3a15 10 0 010 20M13 3a15 10 0 000 20"/></svg>
          </span>
          <span class="label">Explore</span>
        </a>
        <a class="tab-btn" href="#">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 26 26"><circle cx="6" cy="20" r="3"/><circle cx="20" cy="6" r="3"/><path d="M8 18 L18 8"/></svg>
          </span>
          <span class="label">Journey</span>
        </a>
        <a class="tab-btn active" href="challenges.html" aria-current="page">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 26 26"><circle cx="13" cy="13" r="10"/><circle cx="13" cy="13" r="6"/><circle cx="13" cy="13" r="2.5" fill="currentColor"/></svg>
          </span>
          <span class="label">Challenges</span>
        </a>
        <a class="tab-btn" href="#">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 26 26">
              <path d="M13 3 L15 6 L18.5 5.5 L19.5 9 L23 11 L21.5 14 L23 17 L19.5 19 L18.5 22.5 L15 22 L13 25 L11 22 L7.5 22.5 L6.5 19 L3 17 L4.5 14 L3 11 L6.5 9 L7.5 5.5 L11 6 Z"/>
              <circle cx="13" cy="14" r="3.5"/>
            </svg>
          </span>
          <span class="label">Settings</span>
        </a>
      </div>
    </nav>

  </div>

  <script>
    const heroCard      = document.getElementById('hero-card');
    const heroToggle    = document.getElementById('hero-toggle');
    const progressFill  = document.getElementById('progress-fill');
    const progressLabel = document.getElementById('progress-label');
    const leagueBadge   = document.getElementById('league-badge');
    const leagueImg     = document.getElementById('league-img');

    const MAX_LEAGUE = 5;
    const LESSONS_PER_LEAGUE = 5;
    const state = { league: 1, progress: 4 };
    let lastCausedLevelUp = false;
    let animating = false;

    function paint() {
      const pct = (state.progress / LESSONS_PER_LEAGUE) * 100;
      progressFill.style.width = pct + '%';
      progressLabel.textContent = `${state.progress}/${LESSONS_PER_LEAGUE} lessons to next league`;
    }

    function setLeagueImage(level) {
      leagueImg.src = `assets/challenges/leagues/league-${level}.png`;
    }

    function levelUp() {
      // Bar already animates to 100% via paint(); after it lands, run the league animation.
      animating = true;
      setTimeout(() => {
        leagueBadge.classList.add('is-leveling-up');
        // Swap the league image at the apex of the rotation (mid-way).
        setTimeout(() => {
          state.league += 1;
          setLeagueImage(state.league);
        }, 500);
        // After the spin lands, snap the bar back to 0 for the new league.
        setTimeout(() => {
          leagueBadge.classList.remove('is-leveling-up');
          state.progress = 0;
          progressFill.classList.add('no-anim');
          paint();
          requestAnimationFrame(() => {
            requestAnimationFrame(() => progressFill.classList.remove('no-anim'));
          });
          animating = false;
        }, 1000);
      }, 450);
    }

    function levelDown() {
      // Reverse a previous level-up: snap back to old league at 4/5, with a quick spin in reverse.
      animating = true;
      leagueBadge.style.animationDirection = 'reverse';
      leagueBadge.classList.add('is-leveling-up');
      setTimeout(() => {
        state.league = Math.max(1, state.league - 1);
        setLeagueImage(state.league);
        state.progress = LESSONS_PER_LEAGUE - 1;
        progressFill.classList.add('no-anim');
        paint();
        requestAnimationFrame(() => {
          requestAnimationFrame(() => progressFill.classList.remove('no-anim'));
        });
      }, 500);
      setTimeout(() => {
        leagueBadge.classList.remove('is-leveling-up');
        leagueBadge.style.animationDirection = '';
        animating = false;
      }, 1000);
    }

    heroToggle.addEventListener('click', () => {
      if (animating) return;
      const wasCompleted = heroCard.classList.contains('is-completed');
      heroCard.classList.toggle('is-completed');

      if (!wasCompleted) {
        // +1
        if (state.progress + 1 >= LESSONS_PER_LEAGUE && state.league < MAX_LEAGUE) {
          state.progress = LESSONS_PER_LEAGUE;
          paint();
          lastCausedLevelUp = true;
          levelUp();
        } else {
          state.progress = Math.min(state.progress + 1, LESSONS_PER_LEAGUE);
          paint();
          lastCausedLevelUp = false;
        }
      } else {
        // -1
        if (lastCausedLevelUp && state.league > 1) {
          lastCausedLevelUp = false;
          levelDown();
        } else {
          state.progress = Math.max(state.progress - 1, 0);
          paint();
        }
      }
    });

    paint();
  </script>
</body>
</html>
